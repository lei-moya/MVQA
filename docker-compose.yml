# 与当前代码一致：FastAPI + SQLite（database.py）+ BackgroundTasks（job_queue.py）。
# 未使用 RQ / Celery / Redis、未使用 MySQL / MinIO；分析任务由进程内 BackgroundTasks 调度。

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/backend/uploads
      # SQLite 默认在容器内 /app/video_rating.db（见 backend/database.py）；持久化可取消下行注释
      # - ./video_rating.db:/app/video_rating.db
    environment:
      # 可选：覆盖 backend/settings.py 默认值
      - JWT_SECRET=${JWT_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
